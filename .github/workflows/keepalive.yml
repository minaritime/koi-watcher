name: Keepalive (cron 비활성화 방지)

# GitHub 는 "사람 권한 커밋"이 60일간 없으면 예약(cron) 워크플로우를 비활성화한다.
# 봇(GITHUB_TOKEN) 커밋은 활동으로 인정되지 않으므로, PAT 로 인증한 커밋을
# 40일 이상 유휴 시 자동으로 만들어 타이머를 리셋한다. → KOI/림버스 cron 영구 유지.

on:
  schedule:
    - cron: '0 3 * * 1'   # 매주 월요일 03:00 UTC (60일 한참 전에 충분히 자주 점검)
  workflow_dispatch:
    inputs:
      force:
        description: '강제로 keepalive 커밋 (PAT 동작 테스트용)'
        type: boolean
        default: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (PAT 인증 — 이래야 커밋이 활동으로 인정됨)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.KEEPALIVE_PAT }}
          fetch-depth: 0

      - name: 유휴 40일 이상이면 keepalive 커밋
        run: |
          LAST=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          DAYS=$(( (NOW - LAST) / 86400 ))
          echo "마지막 커밋 후 ${DAYS}일 경과"
          if [ "$DAYS" -ge 40 ] || [ "${{ inputs.force }}" = "true" ]; then
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .keepalive
            git config user.name "minaritime"
            git config user.email "minaritime@users.noreply.github.com"
            git add .keepalive
            git commit -m "chore: keepalive (유휴 ${DAYS}일)"
            git push
            echo "keepalive 커밋 생성 및 push 완료 → cron 타이머 리셋"
          else
            echo "아직 활발함 (${DAYS}일) — keepalive 불필요"
          fi
