name: Limbus Notice Watcher

on:
  schedule:
    # 한국시간(KST=UTC+9) 평일 저녁 18:00~22:00 에 15분 간격 확인.
    # 저녁 6시(KST) = 09:00(UTC), 밤 10시(KST) = 13:00(UTC). 저녁 창은 UTC 같은 날이라 요일(1-5)이 그대로 평일.
    - cron: '*/15 9-12 * * 1-5'   # 18:00~21:45 KST, 15분 간격
    - cron: '0 13 * * 1-5'         # 22:00 KST 마지막 1회
  workflow_dispatch:        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write           # limbus_seen.json 을 다시 커밋하기 위해 필요

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Limbus watcher
        env:
          LIMBUS_WEBHOOK_URL: ${{ secrets.LIMBUS_WEBHOOK_URL }}
        run: python limbus_watcher.py

      - name: Commit updated limbus_seen.json
        run: |
          if git diff --quiet limbus_seen.json 2>/dev/null; then
            echo "변경 없음 — 커밋 스킵"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add limbus_seen.json
            git commit -m "chore: update limbus_seen.json"
            git push
          fi
