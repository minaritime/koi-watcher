name: Limbus Notice Watcher

on:
  schedule:
    # 매일 종일 10분 간격. 공지가 언제(요일/시간 무관) 올라와도 최대 ~10분 내 확인.
    # GitHub 예약 실행은 best-effort 라 정각 부근 등에서 지연·드롭될 수 있는데,
    # 한 슬롯이 드롭돼도 10분 뒤 다음 슬롯이 받아주고 limbus_seen.json 이 중복을 막아준다.
    # public 저장소라 Actions 분이 무제한이므로 이 빈도를 무료로 돌릴 수 있다.
    - cron: '*/10 * * * *'
  workflow_dispatch:        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write           # limbus_seen.json 을 다시 커밋하기 위해 필요

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Limbus watcher
        env:
          LIMBUS_WEBHOOK_URL: ${{ secrets.LIMBUS_WEBHOOK_URL }}
        run: python limbus_watcher.py

      - name: Commit updated limbus_seen.json
        run: |
          if git diff --quiet limbus_seen.json 2>/dev/null; then
            echo "변경 없음 — 커밋 스킵"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add limbus_seen.json
            git commit -m "chore: update limbus_seen.json"
            git push
          fi
